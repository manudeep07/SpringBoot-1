<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records Office</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,500;0,600;0,700;1,500&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

        :root{
            --navy:#1a2f4b;
            --navy-deep:#101f33;
            --parchment:#f7f2e7;
            --card:#fffdf8;
            --ink:#1e1b16;
            --brass:#a97c3f;
            --brass-light:#c99a5c;
            --rule:#d8cdb4;
            --ok:#3f6b4f;
            --ok-bg:#e7efe6;
            --err:#a1442f;
            --err-bg:#f6e7e2;
            --shadow: 0 1px 2px rgba(16,31,51,.06), 0 8px 24px rgba(16,31,51,.08);
        }

        *{box-sizing:border-box}

        body{
            font-family:'Inter',Arial,sans-serif;
            background:
                    repeating-linear-gradient(180deg, transparent 0 39px, rgba(26,47,75,0.05) 39px 40px),
                    var(--parchment);
            color:var(--ink);
            margin:0;
            padding:48px 24px 80px;
        }

        .wrap{max-width:840px;margin:0 auto}

        /* ---- Letterhead ---- */
        .letterhead{
            background:var(--navy);
            background-image:linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
            color:var(--parchment);
            border-radius:2px;
            padding:28px 32px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:20px;
            box-shadow:var(--shadow);
            position:relative;
            overflow:hidden;
        }
        .letterhead::after{
            content:"";
            position:absolute;
            inset:0;
            border:1px solid rgba(247,242,231,.18);
            margin:6px;
            pointer-events:none;
        }
        .letterhead h1{
            font-family:'Source Serif 4',Georgia,serif;
            font-weight:700;
            font-size:26px;
            letter-spacing:.3px;
            margin:0;
        }
        .letterhead .eyebrow{
            font-family:'IBM Plex Mono',monospace;
            font-size:11px;
            letter-spacing:.18em;
            text-transform:uppercase;
            color:var(--brass-light);
            margin:0 0 6px;
        }
        .seal{
            width:56px;height:56px;border-radius:50%;
            border:1.5px solid var(--brass-light);
            display:flex;align-items:center;justify-content:center;
            font-family:'Source Serif 4',serif;
            font-weight:700;font-size:18px;color:var(--brass-light);
            flex:0 0 auto;
            letter-spacing:.5px;
        }

        /* ---- Base URL strip ---- */
        .baseurl{
            margin-top:18px;
            background:var(--card);
            border:1px solid var(--rule);
            border-radius:2px;
            padding:12px 16px;
            display:flex;
            align-items:center;
            gap:12px;
            box-shadow:var(--shadow);
        }
        .baseurl label{
            font-family:'IBM Plex Mono',monospace;
            font-size:11px;
            text-transform:uppercase;
            letter-spacing:.12em;
            color:var(--navy);
            font-weight:600;
            white-space:nowrap;
        }
        .baseurl input{
            border:none;
            background:transparent;
            font-family:'IBM Plex Mono',monospace;
            font-size:13px;
            color:var(--ink);
            flex:1;
            padding:4px 0;
        }
        .baseurl input:focus{outline:none}

        /* ---- Nav bar ---- */
        nav.crud-nav{
            margin-top:22px;
            display:flex;
            background:var(--card);
            border:1px solid var(--rule);
            border-radius:2px;
            box-shadow:var(--shadow);
            overflow:hidden;
        }
        nav.crud-nav button.navlink{
            flex:1;
            margin:0;
            padding:13px 10px;
            border:none;
            border-right:1px solid var(--rule);
            background:transparent;
            color:var(--navy);
            font-family:'IBM Plex Mono',monospace;
            font-size:11.5px;
            font-weight:600;
            letter-spacing:.1em;
            text-transform:uppercase;
            cursor:pointer;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:2px;
            transition:background .15s ease, color .15s ease;
        }
        nav.crud-nav button.navlink:last-child{border-right:none}
        nav.crud-nav button.navlink .idx{
            font-family:'Source Serif 4',serif;
            font-size:15px;
            font-weight:700;
            color:var(--brass);
        }
        nav.crud-nav button.navlink:hover{background:var(--parchment)}
        nav.crud-nav button.navlink.active{
            background:var(--navy);
            color:var(--parchment);
        }
        nav.crud-nav button.navlink.active .idx{color:var(--brass-light)}
        nav.crud-nav button.navlink.active.is-delete{background:var(--err)}
        nav.crud-nav button.navlink.active.is-delete .idx{color:#f3d6ce}

        /* ---- Card / section (index-card motif) ---- */
        .cards{
            margin-top:20px;
            display:grid;
            grid-template-columns:1fr;
            gap:20px;
        }
        .card.panel{display:none}
        .card.panel.active{display:block}

        .card{
            background:var(--card);
            border:1px solid var(--rule);
            border-radius:2px;
            box-shadow:var(--shadow);
            position:relative;
            padding:20px 20px 18px;
        }
        .card.full{grid-column:1 / -1}

        .tab{
            position:absolute;
            top:-13px;
            left:18px;
            background:var(--navy);
            color:var(--parchment);
            font-family:'IBM Plex Mono',monospace;
            font-size:10px;
            letter-spacing:.14em;
            text-transform:uppercase;
            padding:4px 10px;
            border-radius:2px;
            box-shadow:0 2px 4px rgba(0,0,0,.15);
        }
        .card h2{
            font-family:'Source Serif 4',Georgia,serif;
            font-size:18px;
            font-weight:600;
            margin:10px 0 14px;
            color:var(--navy);
            padding-bottom:8px;
            border-bottom:1px dashed var(--rule);
        }

        .subdivider{
            display:flex;
            align-items:center;
            gap:10px;
            margin:22px 0 4px;
        }
        .subdivider::before,.subdivider::after{
            content:"";
            flex:1;
            border-top:1px dashed var(--rule);
        }
        .subdivider span{
            font-family:'IBM Plex Mono',monospace;
            font-size:10px;
            letter-spacing:.14em;
            text-transform:uppercase;
            color:#a39a86;
        }
        button.secondary{
            background:transparent;
            color:var(--navy);
            border:1px solid var(--navy);
        }
        button.secondary:hover{background:var(--navy);color:var(--parchment)}

        label{
            display:block;
            font-size:11px;
            font-weight:600;
            letter-spacing:.06em;
            text-transform:uppercase;
            color:#6b6357;
            margin-top:12px;
        }
        input[type=text], input[type=number], input:not([type]){
            width:100%;
            padding:9px 10px;
            margin-top:5px;
            border:1px solid var(--rule);
            border-radius:2px;
            background:#fffef9;
            font-family:'Inter',sans-serif;
            font-size:14px;
            color:var(--ink);
            transition:border-color .15s ease, box-shadow .15s ease;
        }
        input:focus{
            outline:none;
            border-color:var(--brass);
            box-shadow:0 0 0 3px rgba(169,124,63,.15);
        }

        button{
            margin-top:16px;
            padding:10px 18px;
            border:none;
            border-radius:2px;
            background:var(--navy);
            color:var(--parchment);
            font-family:'IBM Plex Mono',monospace;
            font-size:12px;
            font-weight:600;
            letter-spacing:.08em;
            text-transform:uppercase;
            cursor:pointer;
            transition:background .15s ease, transform .1s ease;
        }
        button:hover{background:var(--navy-deep)}
        button:active{transform:translateY(1px)}
        button.delete{background:var(--err)}
        button.delete:hover{background:#832f1f}

        .msg{
            margin-top:12px;
            font-family:'IBM Plex Mono',monospace;
            font-size:12px;
            font-weight:600;
            padding:6px 10px;
            border-radius:2px;
            display:none;
            align-items:center;
            gap:6px;
        }
        .msg.show{display:inline-flex}
        .msg.ok{background:var(--ok-bg);color:var(--ok)}
        .msg.err{background:var(--err-bg);color:var(--err)}
        .msg .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

        /* ---- Response ledger ---- */
        .card.full h2{display:flex;align-items:center;justify-content:space-between;border-bottom:none;padding-bottom:0}
        .card.full h2 .stamp{
            font-family:'IBM Plex Mono',monospace;
            font-size:10px;
            letter-spacing:.1em;
            text-transform:uppercase;
            color:var(--brass);
            border:1px solid var(--brass);
            border-radius:2px;
            padding:3px 8px;
        }
        pre{
            background:var(--navy-deep);
            color:#e8e2d3;
            padding:16px;
            border-radius:2px;
            overflow:auto;
            font-family:'IBM Plex Mono',monospace;
            font-size:12.5px;
            line-height:1.6;
            margin-top:12px;
            max-height:340px;
        }
        pre .placeholder{color:#8a8578;font-style:italic}

        footer{
            text-align:center;
            margin-top:32px;
            font-family:'IBM Plex Mono',monospace;
            font-size:10.5px;
            letter-spacing:.1em;
            text-transform:uppercase;
            color:#9b9280;
        }
    </style>
</head>
<body>
<div class="wrap">

    <div class="letterhead">
        <div>
            <p class="eyebrow">Office of the Registrar &middot; Records Division</p>
            <h1>Student CRUD</h1>
        </div>
        <div class="seal">SR</div>
    </div>

    <div class="baseurl">
        <label for="baseUrl">API Base URL</label>
        <input id="baseUrl" value="http://localhost:8080">
    </div>

    <nav class="crud-nav">
        <button class="navlink active" data-panel="panel-create" onclick="showPanel('panel-create',this)">
            <span class="idx">C</span>Create
        </button>
        <button class="navlink" data-panel="panel-read" onclick="showPanel('panel-read',this)">
            <span class="idx">R</span>Read
        </button>
        <button class="navlink" data-panel="panel-update" onclick="showPanel('panel-update',this)">
            <span class="idx">U</span>Update
        </button>
        <button class="navlink is-delete" data-panel="panel-delete" onclick="showPanel('panel-delete',this)">
            <span class="idx">D</span>Delete
        </button>
    </nav>

    <div class="cards">

        <div class="card panel active" id="panel-create">
            <span class="tab">Form 01</span>
            <h2>Create Student</h2>
            <label for="c-name">Name</label>
            <input id="c-name">
            <label for="c-age">Age</label>
            <input id="c-age" type="number">
            <label for="c-department">Department</label>
            <input id="c-department">
            <button onclick="createStudent()">Create</button>
            <div id="c-msg" class="msg"></div>
        </div>

        <div class="card panel" id="panel-read">
            <span class="tab">Form 02</span>
            <h2>Get Student</h2>
            <label for="r-id">Student ID</label>
            <input id="r-id" type="number">
            <button onclick="readStudent()">Get</button>
            <div id="r-msg" class="msg"></div>

            <div class="subdivider"><span>or</span></div>
            <button class="secondary" onclick="getAllStudents()">Get All Students</button>
            <div id="ra-msg" class="msg"></div>
        </div>

        <div class="card panel" id="panel-update">
            <span class="tab">Form 03</span>
            <h2>Update Student</h2>
            <label for="u-id">Student ID</label>
            <input id="u-id" type="number">
            <label for="u-name">Name</label>
            <input id="u-name">
            <label for="u-age">Age</label>
            <input id="u-age" type="number">
            <label for="u-department">Department</label>
            <input id="u-department">
            <button onclick="updateStudent()">Update</button>
            <div id="u-msg" class="msg"></div>
        </div>

        <div class="card panel" id="panel-delete">
            <span class="tab">Form 04</span>
            <h2>Delete Student</h2>
            <label for="d-id">Student ID</label>
            <input id="d-id" type="number">
            <button class="delete" onclick="deleteStudent()">Delete</button>
            <div id="d-msg" class="msg"></div>
        </div>

        <div class="card full">
            <span class="tab">Ledger</span>
            <h2>Response <span class="stamp">Latest Entry</span></h2>
            <pre id="output"><span class="placeholder">No Data</span></pre>
        </div>

    </div>

    <footer>Filed electronically &middot; Records Office Terminal</footer>
</div>

<script>
    function showPanel(panelId, btn){
        document.querySelectorAll(".card.panel").forEach(p=>p.classList.remove("active"));
        document.querySelectorAll(".navlink").forEach(b=>b.classList.remove("active"));
        document.getElementById(panelId).classList.add("active");
        btn.classList.add("active");
    }

    function base(){return document.getElementById("baseUrl").value.replace(/\/$/,'');}

    function show(id,msg,isOk){
        const el=document.getElementById(id);
        el.innerText=msg;
        el.classList.remove("ok","err");
        el.classList.add("show", isOk?"ok":"err");
    }

    function render(data){
        document.getElementById("output").textContent=JSON.stringify(data,null,2);
    }

    async function createStudent(){
        const body={
            name:document.getElementById("c-name").value,
            age:Number(document.getElementById("c-age").value),
            department:document.getElementById("c-department").value
        };
        const res=await fetch(base()+"/create",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(body)
        });
        const data=await res.json().catch(()=>null);
        show("c-msg",res.ok?"Created":"Failed",res.ok);
        render(data);
    }

    async function readStudent(){
        const id=document.getElementById("r-id").value;
        const res=await fetch(base()+"/getStudent/"+id);
        const data=await res.json().catch(()=>null);
        show("r-msg",res.ok?"Success":"Not Found",res.ok);
        render(data);
    }

    async function getAllStudents(){
        const res=await fetch(base()+"/getAll");
        const data=await res.json().catch(()=>null);
        show("ra-msg",res.ok?"Success":"Failed",res.ok);
        render(data);
    }

    async function updateStudent(){
        const id=document.getElementById("u-id").value;
        const body={};
        const n=document.getElementById("u-name").value;
        const a=document.getElementById("u-age").value;
        const d=document.getElementById("u-department").value;

        if(n) body.name=n;
        if(a) body.age=Number(a);
        if(d) body.department=d;

        const res=await fetch(base()+"/update/"+id,{
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(body)
        });
        const data=await res.json().catch(()=>null);
        show("u-msg",res.ok?"Updated":"Failed",res.ok);
        render(data);
    }

    async function deleteStudent(){
        const id=document.getElementById("d-id").value;
        const res=await fetch(base()+"/deleteStudent/"+id,{method:"DELETE"});
        const text=await res.text();
        show("d-msg",text,res.ok);
        document.getElementById("output").textContent=text;
    }
</script>
</body>
</html>
